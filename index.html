<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AniStreamID - Nonton Anime Sub Indo</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0b0b1a;
            color: #eef2ff;
            line-height: 1.5;
        }

        /* scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1f1f2e;
        }
        ::-webkit-scrollbar-thumb {
            background: #ff5e7c;
            border-radius: 8px;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* container */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* header */
        header {
            background: #070712;
            border-bottom: 1px solid #2a2a3a;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            background-color: rgba(7,7,18,0.9);
        }
        .navbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            gap: 16px;
        }
        .logo h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff8a5c, #ff4d6d);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo span {
            font-size: 0.8rem;
            background: #2a2a3a;
            padding: 2px 8px;
            border-radius: 30px;
            font-weight: normal;
            color: #ccc;
        }
        .search-bar {
            flex: 1;
            max-width: 450px;
            display: flex;
            gap: 8px;
        }
        .search-bar input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 40px;
            border: none;
            background: #1e1e2c;
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
        }
        .search-bar input:focus {
            background: #2d2d3f;
            box-shadow: 0 0 0 2px #ff5e7c;
        }
        .search-bar button {
            background: #ff5e7c;
            border: none;
            border-radius: 40px;
            padding: 0 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .search-bar button:hover {
            background: #e04b67;
        }
        .nav-links {
            display: flex;
            gap: 18px;
            font-weight: 500;
        }
        .nav-links a {
            transition: 0.2s;
        }
        .nav-links a:hover, .nav-links a.active {
            color: #ff7b5c;
        }

        /* tabs kategori */
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 24px 0 20px;
            border-bottom: 1px solid #282838;
            padding-bottom: 12px;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            color: #b9c3e6;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .tab-btn.active {
            background: #ff5e7c;
            color: white;
            box-shadow: 0 4px 12px rgba(255,94,124,0.3);
        }
        .tab-btn:hover:not(.active) {
            background: #2a2a3a;
            color: white;
        }

        /* anime grid */
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 24px;
            margin: 28px 0;
        }
        .anime-card {
            background: #12121f;
            border-radius: 20px;
            overflow: hidden;
            transition: 0.25s ease;
            cursor: pointer;
            border: 1px solid #26263a;
        }
        .anime-card:hover {
            transform: translateY(-6px);
            border-color: #ff5e7c;
            box-shadow: 0 12px 24px rgba(0,0,0,0.5);
        }
        .anime-img {
            width: 100%;
            aspect-ratio: 2/2.8;
            object-fit: cover;
            background: #0a0a14;
        }
        .anime-info {
            padding: 12px;
        }
        .anime-title {
            font-weight: 700;
            font-size: 0.9rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 6px;
        }
        .anime-meta {
            font-size: 0.7rem;
            color: #adb7e0;
            display: flex;
            justify-content: space-between;
        }
        .load-more {
            text-align: center;
            margin: 30px 0;
        }
        .load-more button {
            background: #28283c;
            border: none;
            padding: 12px 32px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .load-more button:hover {
            background: #ff5e7c;
        }
        /* detail + episode */
        .detail-section {
            background: #0f0f1a;
            border-radius: 28px;
            margin: 20px 0;
            padding: 24px;
        }
        .detail-header {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
        }
        .detail-poster img {
            width: 200px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .detail-info {
            flex: 1;
        }
        .detail-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 12px;
        }
        .detail-synopsis {
            margin: 16px 0;
            color: #ccd6f6;
            line-height: 1.5;
        }
        .episode-list {
            margin-top: 30px;
        }
        .episode-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
            max-height: 400px;
            overflow-y: auto;
        }
        .episode-btn {
            background: #232338;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
        }
        .episode-btn:hover {
            background: #ff5e7c;
        }
        .player-container {
            margin-top: 25px;
            background: #000000aa;
            border-radius: 24px;
            padding: 15px;
        }
        iframe {
            width: 100%;
            height: 450px;
            border-radius: 20px;
            border: none;
        }
        .back-button {
            background: #2a2a3a;
            display: inline-block;
            margin-bottom: 18px;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .loading {
            text-align: center;
            padding: 60px;
            font-size: 1.2rem;
            color: #aaa;
        }
        footer {
            text-align: center;
            padding: 32px 0;
            border-top: 1px solid #1f1f2e;
            margin-top: 40px;
            font-size: 0.8rem;
            color: #7b86a8;
        }
        @media (max-width: 700px) {
            .navbar {
                flex-direction: column;
                align-items: stretch;
            }
            .search-bar {
                max-width: 100%;
            }
            .detail-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="container">
        <div class="navbar">
            <div class="logo">
                <h1>AniStream<span>ID</span></h1>
            </div>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Cari anime... (contoh: solo leveling, one piece)" autocomplete="off">
                <button id="searchBtn"><i class="fas fa-search"></i> Cari</button>
            </div>
            <div class="nav-links">
                <a href="#" data-nav="home" class="active"><i class="fas fa-home"></i> Home</a>
                <a href="#" data-nav="ongoing"><i class="fas fa-play-circle"></i> Ongoing</a>
                <a href="#" data-nav="completed"><i class="fas fa-check-circle"></i> Completed</a>
            </div>
        </div>
    </div>
</header>

<main class="container">
    <!-- tabs quick -->
    <div class="tabs">
        <button class="tab-btn active" data-tab="anime">🎬 Anime</button>
        <button class="tab-btn" data-tab="donghua">🐉 Donghua</button>
        <button class="tab-btn" data-tab="movie">🍿 Movie</button>
    </div>

    <div id="contentArea">
        <!-- dynamic content akan di render disini -->
        <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Memuat anime terbaru...</div>
    </div>
    <div id="loadMoreContainer" class="load-more" style="display: none;">
        <button id="loadMoreBtn">Muat lebih banyak <i class="fas fa-arrow-down"></i></button>
    </div>
</main>
<footer>
    <p>AniStreamID • Sumber dari berbagai endpoint anime • Untuk keperluan streaming nonton anime</p>
</footer>

<script>
    // -------------------------- BASE API (sankavollerei.com) --------------------------
    const BASE_API = "https://www.sankavollerei.com";

    // state
    let currentMode = "home";       // home, ongoing, completed, search, donghua, movie, genre? 
    let currentPage = 1;
    let currentKeyword = "";
    let currentDonghuaPage = 1;
    let currentMoviePage = 1;
    let currentAnimeListType = "ongoing-anime"; // untuk ongoing / completed dari anime biasa
    let activeTab = "anime";        // anime / donghua / movie
    
    // untuk menyimpan detail & episode yg sedang dibuka
    let currentDetail = null;
    let currentEpisodes = [];   // list episode object {slug, title}
    let isDetailMode = false;
    
    // DOM elements
    const contentArea = document.getElementById("contentArea");
    const loadMoreContainer = document.getElementById("loadMoreContainer");
    const loadMoreBtn = document.getElementById("loadMoreBtn");
    const searchInput = document.getElementById("searchInput");
    const searchBtn = document.getElementById("searchBtn");
    const navLinks = document.querySelectorAll("[data-nav]");
    const tabBtns = document.querySelectorAll(".tab-btn");
    
    // Helper fetch JSON
    async function fetchAPI(url) {
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            return data;
        } catch (err) {
            console.error("fetch error", url, err);
            return null;
        }
    }
    
    // reset state ketika keluar detail
    function exitDetailMode() {
        isDetailMode = false;
        currentDetail = null;
        currentEpisodes = [];
        loadMoreContainer.style.display = "none";
        // reload sesuai mode
        renderCurrentView();
    }
    
    // navigasi
    function setMode(mode) {
        currentMode = mode;
        currentPage = 1;
        currentKeyword = "";
        searchInput.value = "";
        isDetailMode = false;
        activeTab = "anime";    // default, nanti sinkron
        if(mode === "ongoing") currentAnimeListType = "ongoing-anime";
        if(mode === "completed") currentAnimeListType = "complete-anime";
        if(mode === "home") activeTab = "anime";
        renderCurrentView();
    }
    
    // render berdasarkan mode, tab, page
    async function renderCurrentView() {
        if(isDetailMode && currentDetail) {
            await renderDetailPage(currentDetail, currentEpisodes);
            return;
        }
        contentArea.innerHTML = `<div class="loading"><i class="fas fa-spinner fa-pulse"></i> Memuat...</div>`;
        loadMoreContainer.style.display = "none";
        
        // handle tab dan mode
        if (activeTab === "anime") {
            if(currentMode === "search" && currentKeyword) {
                await loadSearchAnime(currentKeyword, currentPage);
            } else if(currentMode === "ongoing") {
                await loadAnimeList("ongoing-anime", currentPage);
            } else if(currentMode === "completed") {
                await loadAnimeList("complete-anime", currentPage);
            } else { // home
                await loadHomeAnime();
            }
        } 
        else if (activeTab === "donghua") {
            if(currentMode === "search" && currentKeyword) {
                await loadSearchDonghua(currentKeyword, currentPage);
            } else if(currentMode === "ongoing") {
                await loadDonghuaOngoing(currentPage);
            } else if(currentMode === "completed") {
                await loadDonghuaCompleted(currentPage);
            } else {
                await loadDonghuaHome(currentPage);
            }
        }
        else if (activeTab === "movie") {
            // movie dari anime movie endpoint (banyak sumber: bisa ambil dari /anime/stream/movie atau /anime/samehadaku/movies)
            // pakai endpoint /anime/stream/movie karena simple
            if(currentMode === "search" && currentKeyword) {
                await loadSearchMovie(currentKeyword, currentPage);
            } else {
                await loadMovieList(currentPage);
            }
        }
    }
    
    // ----- Anime Section Endpoints -----
    async function loadHomeAnime() {
        // endpoint home anime: /anime/home (data struktur: list anime? cek respon)
        const data = await fetchAPI(`${BASE_API}/anime/home`);
        if(data && data.data && Array.isArray(data.data)) {
            renderAnimeGrid(data.data);
            loadMoreContainer.style.display = "none";
        } else if(data && data.anime_list) {
            renderAnimeGrid(data.anime_list);
        } else {
            contentArea.innerHTML = `<div class="loading">Gagal memuat home, coba gunakan ongoing</div>`;
        }
    }
    
    async function loadAnimeList(type, page) {
        const url = `${BASE_API}/anime/${type}?page=${page}`;
        const data = await fetchAPI(url);
        let animeList = [];
        if(data && data.data && Array.isArray(data.data)) animeList = data.data;
        else if(data && Array.isArray(data)) animeList = data;
        else if(data && data.anime) animeList = data.anime;
        if(animeList.length) {
            renderAnimeGrid(animeList);
            if(animeList.length >= 20) showLoadMore(() => { currentPage++; loadAnimeList(type, currentPage); });
            else loadMoreContainer.style.display = "none";
        } else {
            contentArea.innerHTML = `<div class="loading">Tidak ada anime ditemukan.</div>`;
        }
    }
    
    async function loadSearchAnime(keyword, page) {
        const url = `${BASE_API}/anime/search/${encodeURIComponent(keyword)}?page=${page}`;
        const data = await fetchAPI(url);
        let results = [];
        if(data && data.data) results = data.data;
        else if(Array.isArray(data)) results = data;
        if(results.length) {
            renderAnimeGrid(results);
            if(results.length >= 20) showLoadMore(() => { currentPage++; loadSearchAnime(keyword, currentPage); });
            else loadMoreContainer.style.display = "none";
        } else {
            contentArea.innerHTML = `<div class="loading">Tidak ada hasil untuk "${keyword}"</div>`;
        }
    }
    
    // ----- Donghua Endpoints (mengikuti pola donghua/home/:page, ongoing, completed)
    async function loadDonghuaHome(page=1) {
        const url = `${BASE_API}/anime/donghua/home/${page}`;
        const data = await fetchAPI(url);
        let list = [];
        if(data && data.data && Array.isArray(data.data)) list = data.data;
        else if(Array.isArray(data)) list = data;
        if(list.length) {
            renderAnimeGrid(list);
            if(list.length >= 20) showLoadMore(() => { currentPage++; loadDonghuaHome(currentPage); });
            else loadMoreContainer.style.display = "none";
        } else {
            contentArea.innerHTML = `<div class="loading">Gagal memuat donghua home.</div>`;
        }
    }
    
    async function loadDonghuaOngoing(page) {
        const url = `${BASE_API}/anime/donghua/ongoing/${page}`;
        const data = await fetchAPI(url);
        let list = data?.data || (Array.isArray(data) ? data : []);
        if(list.length) {
            renderAnimeGrid(list);
            if(list.length >= 20) showLoadMore(() => { currentPage++; loadDonghuaOngoing(currentPage); });
            else loadMoreContainer.style.display = "none";
        } else {
            contentArea.innerHTML = `<div class="loading">Tidak ada donghua ongoing.</div>`;
        }
    }
    
    async function loadDonghuaCompleted(page) {
        const url = `${BASE_API}/anime/donghua/completed/${page}`;
        const data = await fetchAPI(url);
        let list = data?.data || (Array.isArray(data) ? data : []);
        if(list.length) {
            renderAnimeGrid(list);
            if(list.length >= 20) showLoadMore(() => { currentPage++; loadDonghuaCompleted(currentPage); });
            else loadMoreContainer.style.display = "none";
        } else {
            contentArea.innerHTML = `<div class="loading">Donghua completed tidak ditemukan.</div>`;
        }
    }
    
    async function loadSearchDonghua(keyword, page) {
        const url = `${BASE_API}/anime/donghua/search/${encodeURIComponent(keyword)}/${page}`;
        const data = await fetchAPI(url);
        let list = data?.data || (Array.isArray(data) ? data : []);
        if(list.length) {
            renderAnimeGrid(list);
            if(list.length >= 20) showLoadMore(() => { currentPage++; loadSearchDonghua(keyword, currentPage); });
            else loadMoreContainer.style.display = "none";
        } else {
            contentArea.innerHTML = `<div class="loading">Donghua tidak ditemukan: ${keyword}</div>`;
        }
    }
    
    // ----- Movie Endpoint (anime movie)
    async function loadMovieList(page) {
        // pakai /anime/stream/movie/:page
        const url = `${BASE_API}/anime/stream/movie/${page}`;
        const data = await fetchAPI(url);
        let movies = [];
        if(data && data.data && Array.isArray(data.data)) movies = data.data;
        else if(Array.isArray(data)) movies = data;
        if(movies.length) {
            renderAnimeGrid(movies);
            if(movies.length >= 20) showLoadMore(() => { currentPage++; loadMovieList(currentPage); });
            else loadMoreContainer.style.display = "none";
        } else {
            contentArea.innerHTML = `<div class="loading">Movie tidak tersedia.</div>`;
        }
    }
    
    async function loadSearchMovie(keyword, page) {
        // fallback pencarian movie via anime search karena movie jarang punya dedicated search
        const url = `${BASE_API}/anime/search/${encodeURIComponent(keyword)}?page=${page}`;
        const data = await fetchAPI(url);
        let results = data?.data || (Array.isArray(data) ? data : []);
        if(results.length) {
            renderAnimeGrid(results);
            if(results.length >= 20) showLoadMore(() => { currentPage++; loadSearchMovie(keyword, currentPage); });
            else loadMoreContainer.style.display = "none";
        } else {
            contentArea.innerHTML = `<div class="loading">Movie tidak ditemukan: ${keyword}</div>`;
        }
    }
    
    // render grid anime (universal)
    function renderAnimeGrid(animeList) {
        if(!animeList.length) {
            contentArea.innerHTML = `<div class="loading">Tidak ada konten untuk ditampilkan.</div>`;
            return;
        }
        const html = `
            <div class="anime-grid">
                ${animeList.map(anime => `
                    <div class="anime-card" data-slug="${anime.slug || anime.id || anime.link_slug || ''}" data-title="${anime.title || anime.judul || ''}" data-poster="${anime.poster || anime.thumbnail || anime.image || ''}" data-detail='${JSON.stringify(anime)}'>
                        <img class="anime-img" src="${anime.poster || anime.thumbnail || anime.image || 'https://via.placeholder.com/200x280?text=No+Image'}" alt="${anime.title || 'Anime'}" loading="lazy" onerror="this.src='https://via.placeholder.com/200x280?text=Error'">
                        <div class="anime-info">
                            <div class="anime-title">${anime.title || anime.judul || 'Tanpa judul'}</div>
                            <div class="anime-meta"><span>${anime.status || (anime.episode ? `EP: ${anime.episode}` : '')}</span><span>${anime.genre ? (anime.genre.split(',')[0]) : ''}</span></div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
        contentArea.innerHTML = html;
        // attach event listener setiap card
        document.querySelectorAll('.anime-card').forEach(card => {
            card.addEventListener('click', async (e) => {
                e.stopPropagation();
                const slug = card.dataset.slug;
                if(!slug) return;
                await fetchAnimeDetail(slug);
            });
        });
    }
    
    // fetch detail anime berdasarkan slug (anime biasa, donghua juga sama)
    async function fetchAnimeDetail(slug) {
        contentArea.innerHTML = `<div class="loading"><i class="fas fa-spinner fa-pulse"></i> Mengambil detail...</div>`;
        // coba endpoint detail anime (umum) dan juga bisa dari donghua
        let detailData = null;
        if(activeTab === "donghua") {
            detailData = await fetchAPI(`${BASE_API}/anime/donghua/detail/${slug}`);
        } else {
            detailData = await fetchAPI(`${BASE_API}/anime/anime/${slug}`);
            if(!detailData || !detailData.title) {
                detailData = await fetchAPI(`${BASE_API}/anime/oploverz/anime/${slug}`);
            }
            if(!detailData || !detailData.title) {
                detailData = await fetchAPI(`${BASE_API}/anime/animasu/detail/${slug}`);
            }
        }
        if(detailData && (detailData.title || detailData.judul)) {
            let episodes = [];
            if(detailData.episode_list && Array.isArray(detailData.episode_list)) episodes = detailData.episode_list;
            else if(detailData.episodes && Array.isArray(detailData.episodes)) episodes = detailData.episodes;
            else if(detailData.list_episode) episodes = detailData.list_episode;
            else {
                // buat dummy dari total episode atau coba cari endpoint episode tidak tersedia
                episodes = [];
            }
            currentDetail = detailData;
            currentEpisodes = episodes;
            isDetailMode = true;
            await renderDetailPage(detailData, episodes);
        } else {
            contentArea.innerHTML = `<div class="loading">Gagal mengambil detail. Coba kembali nanti.<br><button class="back-button" onclick="location.reload()">Refresh</button></div>`;
        }
    }
    
    async function renderDetailPage(detail, episodes) {
        const poster = detail.poster || detail.thumbnail || detail.image || 'https://via.placeholder.com/200x280';
        const title = detail.title || detail.judul || detail.name || "Detail Anime";
        const synopsis = detail.synopsis || detail.sinopsis || "Sinopsis tidak tersedia.";
        const genres = detail.genres ? (Array.isArray(detail.genres) ? detail.genres.join(', ') : detail.genres) : 'Tidak diketahui';
        const status = detail.status || (detail.ongoing ? "Ongoing" : "Completed");
        
        let episodeHtml = `<div class="episode-list"><h3>Daftar Episode</h3><div class="episode-grid">`;
        if(episodes && episodes.length) {
            episodes.forEach((ep, idx) => {
                let epSlug = ep.slug || ep.episode_slug || (detail.slug ? `${detail.slug}-episode-${idx+1}` : '');
                let epNum = ep.episode || ep.title || `Episode ${idx+1}`;
                episodeHtml += `<div class="episode-btn" data-epslug="${epSlug}" data-epnum="${epNum}">${epNum}</div>`;
            });
        } else {
            episodeHtml += `<div class="loading" style="grid-column:1/-1">Belum ada episode tersedia atau coba cek sumber lain</div>`;
        }
        episodeHtml += `</div></div><div id="playerWrapper" style="margin-top:20px;"></div>`;
        
        const html = `
            <div class="back-button" id="backFromDetail"><i class="fas fa-arrow-left"></i> Kembali</div>
            <div class="detail-section">
                <div class="detail-header">
                    <div class="detail-poster"><img src="${poster}" alt="${title}"></div>
                    <div class="detail-info">
                        <div class="detail-title">${title}</div>
                        <div><strong>Status:</strong> ${status} | <strong>Genre:</strong> ${genres}</div>
                        <div class="detail-synopsis"><strong>Sinopsis:</strong><br>${synopsis.substring(0, 800)}${synopsis.length>800 ? '...' : ''}</div>
                    </div>
                </div>
                ${episodeHtml}
            </div>
        `;
        contentArea.innerHTML = html;
        document.getElementById("backFromDetail")?.addEventListener("click", () => exitDetailMode());
        // attach episode click
        document.querySelectorAll('.episode-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                let epSlug = btn.dataset.epslug;
                if(!epSlug) {
                    alert("Tidak ada link episode, coba pilih sumber lain");
                    return;
                }
                await loadEpisodeStream(epSlug);
            });
        });
        loadMoreContainer.style.display = "none";
    }
    
    async function loadEpisodeStream(episodeSlug) {
        const playerDiv = document.getElementById("playerWrapper");
        if(!playerDiv) return;
        playerDiv.innerHTML = `<div class="loading"><i class="fas fa-spinner fa-pulse"></i> Mengambil link player...</div>`;
        // coba endpoint episode untuk mendapatkan server (biasanya dapat link embed)
        let episodeDetail = await fetchAPI(`${BASE_API}/anime/episode/${episodeSlug}`);
        if(!episodeDetail || !episodeDetail.streaming_url) {
            // fallback: coba endpoint server? kita coba cari server_id
            if(episodeDetail && episodeDetail.servers && episodeDetail.servers.length) {
                const firstServer = episodeDetail.servers[0];
                if(firstServer && firstServer.id) {
                    const serverData = await fetchAPI(`${BASE_API}/anime/server/${firstServer.id}`);
                    if(serverData && serverData.embed_url) {
                        showIframe(serverData.embed_url);
                        return;
                    }
                }
            }
            playerDiv.innerHTML = `<div style="background:#1f1f2e; padding:20px; border-radius:20px;">Link streaming tidak ditemukan. Coba cek episode lain.</div>`;
        } else {
            showIframe(episodeDetail.streaming_url);
        }
        
        function showIframe(url) {
            playerDiv.innerHTML = `
                <div class="player-container">
                    <iframe src="${url}" allowfullscreen frameborder="0"></iframe>
                </div>
            `;
        }
    }
    
    function showLoadMore(callback) {
        loadMoreContainer.style.display = "block";
        const newBtn = document.getElementById("loadMoreBtn");
        if(newBtn) {
            const oldClick = newBtn.onclick;
            newBtn.onclick = (e) => {
                callback();
                loadMoreContainer.style.display = "none";
            };
        }
    }
    
    // handle navigasi & tab
    navLinks.forEach(link => {
        link.addEventListener("click", (e) => {
            e.preventDefault();
            const navMode = link.dataset.nav;
            navLinks.forEach(l => l.classList.remove("active"));
            link.classList.add("active");
            if(navMode === "home") setMode("home");
            else if(navMode === "ongoing") setMode("ongoing");
            else if(navMode === "completed") setMode("completed");
            currentPage = 1;
            activeTab = "anime";
            tabBtns.forEach(btn => btn.classList.remove("active"));
            document.querySelector(`.tab-btn[data-tab="anime"]`).classList.add("active");
            renderCurrentView();
        });
    });
    
    tabBtns.forEach(btn => {
        btn.addEventListener("click", () => {
            tabBtns.forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            activeTab = btn.dataset.tab;
            currentPage = 1;
            isDetailMode = false;
            renderCurrentView();
        });
    });
    
    searchBtn.addEventListener("click", () => {
        const kw = searchInput.value.trim();
        if(kw === "") return;
        currentKeyword = kw;
        currentMode = "search";
        currentPage = 1;
        isDetailMode = false;
        renderCurrentView();
    });
    searchInput.addEventListener("keypress", (e) => {
        if(e.key === "Enter") searchBtn.click();
    });
    
    // initial load
    setMode("home");
</script>
</body>
</html>
