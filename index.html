<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AniStreamID - Nonton Anime Sub Indo</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0b0b1a;
            color: #eef2ff;
            line-height: 1.5;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1f1f2e;
        }
        ::-webkit-scrollbar-thumb {
            background: #ff5e7c;
            border-radius: 8px;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            background: #070712;
            border-bottom: 1px solid #2a2a3a;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            background-color: rgba(7,7,18,0.95);
        }
        .navbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            gap: 16px;
        }
        .logo h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff8a5c, #ff4d6d);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo span {
            font-size: 0.7rem;
            background: #2a2a3a;
            padding: 2px 8px;
            border-radius: 30px;
        }
        .search-bar {
            flex: 1;
            max-width: 450px;
            display: flex;
            gap: 8px;
        }
        .search-bar input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 40px;
            border: none;
            background: #1e1e2c;
            color: white;
            font-size: 0.9rem;
            outline: none;
        }
        .search-bar input:focus {
            background: #2d2d3f;
            box-shadow: 0 0 0 2px #ff5e7c;
        }
        .search-bar button {
            background: #ff5e7c;
            border: none;
            border-radius: 40px;
            padding: 0 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .search-bar button:hover {
            background: #e04b67;
        }
        .nav-links {
            display: flex;
            gap: 18px;
            font-weight: 500;
        }
        .nav-links a {
            transition: 0.2s;
            cursor: pointer;
        }
        .nav-links a:hover, .nav-links a.active {
            color: #ff7b5c;
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 24px 0 20px;
            border-bottom: 1px solid #282838;
            padding-bottom: 12px;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            color: #b9c3e6;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: #ff5e7c;
            color: white;
            box-shadow: 0 4px 12px rgba(255,94,124,0.3);
        }
        .tab-btn:hover:not(.active) {
            background: #2a2a3a;
            color: white;
        }

        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 24px;
            margin: 28px 0;
        }
        .anime-card {
            background: #12121f;
            border-radius: 20px;
            overflow: hidden;
            transition: 0.25s ease;
            cursor: pointer;
            border: 1px solid #26263a;
        }
        .anime-card:hover {
            transform: translateY(-6px);
            border-color: #ff5e7c;
            box-shadow: 0 12px 24px rgba(0,0,0,0.5);
        }
        .anime-img {
            width: 100%;
            aspect-ratio: 2/2.8;
            object-fit: cover;
            background: #0a0a14;
        }
        .anime-info {
            padding: 12px;
        }
        .anime-title {
            font-weight: 700;
            font-size: 0.9rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 6px;
        }
        .anime-meta {
            font-size: 0.7rem;
            color: #adb7e0;
            display: flex;
            justify-content: space-between;
        }
        .load-more {
            text-align: center;
            margin: 30px 0;
        }
        .load-more button {
            background: #28283c;
            border: none;
            padding: 12px 32px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .load-more button:hover {
            background: #ff5e7c;
        }
        .detail-section {
            background: #0f0f1a;
            border-radius: 28px;
            margin: 20px 0;
            padding: 24px;
        }
        .detail-header {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
        }
        .detail-poster img {
            width: 200px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .detail-info {
            flex: 1;
        }
        .detail-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 12px;
        }
        .detail-synopsis {
            margin: 16px 0;
            color: #ccd6f6;
            line-height: 1.5;
        }
        .episode-list {
            margin-top: 30px;
        }
        .episode-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
            max-height: 400px;
            overflow-y: auto;
        }
        .episode-btn {
            background: #232338;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
        }
        .episode-btn:hover {
            background: #ff5e7c;
        }
        .player-container {
            margin-top: 25px;
            background: #000000aa;
            border-radius: 24px;
            padding: 15px;
        }
        iframe {
            width: 100%;
            height: 450px;
            border-radius: 20px;
            border: none;
        }
        .back-button {
            background: #2a2a3a;
            display: inline-block;
            margin-bottom: 18px;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .loading {
            text-align: center;
            padding: 60px;
            font-size: 1.2rem;
            color: #aaa;
        }
        .error-box {
            text-align: center;
            padding: 40px;
            background: #1a1a2a;
            border-radius: 24px;
            margin: 20px 0;
        }
        .retry-btn {
            background: #ff5e7c;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            margin-top: 16px;
            cursor: pointer;
        }
        footer {
            text-align: center;
            padding: 32px 0;
            border-top: 1px solid #1f1f2e;
            margin-top: 40px;
            font-size: 0.8rem;
            color: #7b86a8;
        }
        @media (max-width: 700px) {
            .navbar {
                flex-direction: column;
                align-items: stretch;
            }
            .search-bar {
                max-width: 100%;
            }
            .detail-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="container">
        <div class="navbar">
            <div class="logo">
                <h1>AniStream<span>Multi Source</span></h1>
            </div>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Cari anime... (solo leveling, one piece, naruto)" autocomplete="off">
                <button id="searchBtn"><i class="fas fa-search"></i> Cari</button>
            </div>
            <div class="nav-links">
                <a data-nav="home" class="active"><i class="fas fa-home"></i> Home</a>
                <a data-nav="ongoing"><i class="fas fa-play-circle"></i> Ongoing</a>
                <a data-nav="completed"><i class="fas fa-check-circle"></i> Completed</a>
            </div>
        </div>
    </div>
</header>

<main class="container">
    <div class="tabs">
        <button class="tab-btn active" data-tab="anime">🎬 Anime</button>
        <button class="tab-btn" data-tab="donghua">🐉 Donghua</button>
        <button class="tab-btn" data-tab="movie">🍿 Movie</button>
    </div>

    <div id="contentArea">
        <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Memuat anime terbaru...</div>
    </div>
    <div id="loadMoreContainer" class="load-more" style="display: none;">
        <button id="loadMoreBtn">Muat lebih banyak <i class="fas fa-arrow-down"></i></button>
    </div>
</main>
<footer>
    <p>AniStreamID • Multi Source Anime • Streaming & Download • 10+ Endpoint Backup</p>
</footer>

<script>
    const BASE_API = "https://www.sankavollerei.com";
    
    // Daftar endpoint untuk fallback detail anime (urutan prioritas)
    const DETAIL_ENDPOINTS = [
        (slug) => `${BASE_API}/anime/anime/${slug}`,
        (slug) => `${BASE_API}/anime/oploverz/anime/${slug}`,
        (slug) => `${BASE_API}/anime/animasu/detail/${slug}`,
        (slug) => `${BASE_API}/anime/alqanime/detail/${slug}`,
        (slug) => `${BASE_API}/anime/samehadaku/anime/${slug}`,
        (slug) => `${BASE_API}/anime/anoboy/anime/${slug}`,
        (slug) => `${BASE_API}/anime/animekuindo/detail/${slug}`,
        (slug) => `${BASE_API}/anime/nimegami/detail/${slug}`,
        (slug) => `${BASE_API}/anime/stream/anime/${slug}`,
        (slug) => `${BASE_API}/anime/kura/anime/0/${slug}`
    ];
    
    // Endpoint untuk episode streaming
    const EPISODE_ENDPOINTS = [
        (slug) => `${BASE_API}/anime/episode/${slug}`,
        (slug) => `${BASE_API}/anime/oploverz/episode/${slug}`,
        (slug) => `${BASE_API}/anime/animasu/episode/${slug}`,
        (slug) => `${BASE_API}/anime/samehadaku/episode/${slug}`,
        (slug) => `${BASE_API}/anime/anoboy/episode/${slug}`,
        (slug) => `${BASE_API}/anime/animekuindo/episode/${slug}`,
        (slug) => `${BASE_API}/anime/stream/episode/${slug}`
    ];
    
    let currentMode = "home";
    let currentPage = 1;
    let currentKeyword = "";
    let activeTab = "anime";
    let isDetailMode = false;
    let currentDetail = null;
    let currentEpisodes = [];
    let currentListData = [];
    
    const contentArea = document.getElementById("contentArea");
    const loadMoreContainer = document.getElementById("loadMoreContainer");
    const loadMoreBtn = document.getElementById("loadMoreBtn");
    const searchInput = document.getElementById("searchInput");
    const searchBtn = document.getElementById("searchBtn");
    const navLinks = document.querySelectorAll("[data-nav]");
    const tabBtns = document.querySelectorAll(".tab-btn");
    
    async function fetchAPI(url, timeout = 10000) {
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), timeout);
            const res = await fetch(url, { signal: controller.signal });
            clearTimeout(timeoutId);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            return data;
        } catch (err) {
            console.warn("Fetch error:", url, err.message);
            return null;
        }
    }
    
    // Coba ambil detail dari multiple endpoint
    async function fetchDetailWithFallback(slug) {
        for (const endpoint of DETAIL_ENDPOINTS) {
            const url = endpoint(slug);
            console.log("Mencoba detail:", url);
            const data = await fetchAPI(url);
            if (data && (data.title || data.judul || data.name)) {
                console.log("Detail ditemukan di:", url);
                return data;
            }
        }
        return null;
    }
    
    // Coba ambil episode dari multiple endpoint
    async function fetchEpisodeWithFallback(episodeSlug) {
        for (const endpoint of EPISODE_ENDPOINTS) {
            const url = endpoint(episodeSlug);
            console.log("Mencoba episode:", url);
            const data = await fetchAPI(url);
            if (data) {
                const streamUrl = data.streaming_url || data.url_stream || data.embed_url || 
                                  (data.servers && data.servers[0] && data.servers[0].url) ||
                                  (data.servers && data.servers[0] && data.servers[0].embed);
                if (streamUrl || (data.servers && data.servers.length > 0)) {
                    console.log("Episode stream ditemukan di:", url);
                    return data;
                }
            }
        }
        return null;
    }
    
    async function getStreamFromServer(serverId) {
        const url = `${BASE_API}/anime/server/${serverId}`;
        const data = await fetchAPI(url);
        return data?.embed_url || data?.url || null;
    }
    
    function exitDetailMode() {
        isDetailMode = false;
        currentDetail = null;
        currentEpisodes = [];
        loadMoreContainer.style.display = "none";
        renderCurrentView();
    }
    
    function setMode(mode) {
        currentMode = mode;
        currentPage = 1;
        currentKeyword = "";
        searchInput.value = "";
        isDetailMode = false;
        renderCurrentView();
    }
    
    async function renderCurrentView() {
        if (isDetailMode && currentDetail) {
            await renderDetailPage(currentDetail, currentEpisodes);
            return;
        }
        
        contentArea.innerHTML = `<div class="loading"><i class="fas fa-spinner fa-pulse"></i> Memuat...</div>`;
        loadMoreContainer.style.display = "none";
        
        if (activeTab === "anime") {
            if (currentMode === "search" && currentKeyword) {
                await loadSearchAnime(currentKeyword, currentPage);
            } else if (currentMode === "ongoing") {
                await loadAnimeList("ongoing-anime", currentPage);
            } else if (currentMode === "completed") {
                await loadAnimeList("complete-anime", currentPage);
            } else {
                await loadHomeAnime();
            }
        } else if (activeTab === "donghua") {
            if (currentMode === "search" && currentKeyword) {
                await loadSearchDonghua(currentKeyword, currentPage);
            } else if (currentMode === "ongoing") {
                await loadDonghuaOngoing(currentPage);
            } else if (currentMode === "completed") {
                await loadDonghuaCompleted(currentPage);
            } else {
                await loadDonghuaHome(currentPage);
            }
        } else if (activeTab === "movie") {
            if (currentMode === "search" && currentKeyword) {
                await loadSearchMovie(currentKeyword, currentPage);
            } else {
                await loadMovieList(currentPage);
            }
        }
    }
    
    async function loadHomeAnime() {
        const data = await fetchAPI(`${BASE_API}/anime/home`);
        let animeList = [];
        if (data && data.data && Array.isArray(data.data)) animeList = data.data;
        else if (data && data.anime_list) animeList = data.anime_list;
        else if (data && Array.isArray(data)) animeList = data;
        
        if (animeList.length) {
            renderAnimeGrid(animeList);
        } else {
            contentArea.innerHTML = `<div class="error-box">⚠️ Gagal memuat home, coba tab lain atau gunakan pencarian</div>`;
        }
    }
    
    async function loadAnimeList(type, page) {
        const url = `${BASE_API}/anime/${type}?page=${page}`;
        const data = await fetchAPI(url);
        let animeList = data?.data || (Array.isArray(data) ? data : []);
        
        if (animeList.length) {
            renderAnimeGrid(animeList);
            if (animeList.length >= 20) {
                showLoadMore(() => { currentPage++; loadAnimeList(type, currentPage); });
            }
        } else {
            contentArea.innerHTML = `<div class="error-box">📭 Tidak ada anime ditemukan</div>`;
        }
    }
    
    async function loadSearchAnime(keyword, page) {
        const url = `${BASE_API}/anime/search/${encodeURIComponent(keyword)}?page=${page}`;
        const data = await fetchAPI(url);
        let results = data?.data || (Array.isArray(data) ? data : []);
        
        if (results.length) {
            renderAnimeGrid(results);
            if (results.length >= 20) {
                showLoadMore(() => { currentPage++; loadSearchAnime(keyword, currentPage); });
            }
        } else {
            contentArea.innerHTML = `<div class="error-box">🔍 Tidak ada hasil untuk "${keyword}"</div>`;
        }
    }
    
    async function loadDonghuaHome(page) {
        const url = `${BASE_API}/anime/donghua/home/${page}`;
        const data = await fetchAPI(url);
        let list = data?.data || (Array.isArray(data) ? data : []);
        
        if (list.length) {
            renderAnimeGrid(list);
            if (list.length >= 20) showLoadMore(() => { currentPage++; loadDonghuaHome(currentPage); });
        } else {
            contentArea.innerHTML = `<div class="error-box">🐉 Donghua tidak tersedia</div>`;
        }
    }
    
    async function loadDonghuaOngoing(page) {
        const url = `${BASE_API}/anime/donghua/ongoing/${page}`;
        const data = await fetchAPI(url);
        let list = data?.data || (Array.isArray(data) ? data : []);
        if (list.length) {
            renderAnimeGrid(list);
            if (list.length >= 20) showLoadMore(() => { currentPage++; loadDonghuaOngoing(currentPage); });
        } else {
            contentArea.innerHTML = `<div class="error-box">🐉 Donghua ongoing kosong</div>`;
        }
    }
    
    async function loadDonghuaCompleted(page) {
        const url = `${BASE_API}/anime/donghua/completed/${page}`;
        const data = await fetchAPI(url);
        let list = data?.data || (Array.isArray(data) ? data : []);
        if (list.length) {
            renderAnimeGrid(list);
            if (list.length >= 20) showLoadMore(() => { currentPage++; loadDonghuaCompleted(currentPage); });
        } else {
            contentArea.innerHTML = `<div class="error-box">🐉 Donghua completed kosong</div>`;
        }
    }
    
    async function loadSearchDonghua(keyword, page) {
        const url = `${BASE_API}/anime/donghua/search/${encodeURIComponent(keyword)}/${page}`;
        const data = await fetchAPI(url);
        let list = data?.data || (Array.isArray(data) ? data : []);
        if (list.length) {
            renderAnimeGrid(list);
            if (list.length >= 20) showLoadMore(() => { currentPage++; loadSearchDonghua(keyword, currentPage); });
        } else {
            contentArea.innerHTML = `<div class="error-box">🐉 Donghua tidak ditemukan: ${keyword}</div>`;
        }
    }
    
    async function loadMovieList(page) {
        const endpoints = [
            `${BASE_API}/anime/stream/movie/${page}`,
            `${BASE_API}/anime/samehadaku/movies?page=${page}`,
            `${BASE_API}/anime/animasu/movies?page=${page}`,
            `${BASE_API}/anime/alqanime/movie?page=${page}`
        ];
        
        let movies = [];
        for (const url of endpoints) {
            const data = await fetchAPI(url);
            let list = data?.data || (Array.isArray(data) ? data : []);
            if (list.length) {
                movies = list;
                break;
            }
        }
        
        if (movies.length) {
            renderAnimeGrid(movies);
            if (movies.length >= 20) showLoadMore(() => { currentPage++; loadMovieList(currentPage); });
        } else {
            contentArea.innerHTML = `<div class="error-box">🍿 Movie tidak tersedia saat ini</div>`;
        }
    }
    
    async function loadSearchMovie(keyword, page) {
        const url = `${BASE_API}/anime/search/${encodeURIComponent(keyword)}?page=${page}`;
        const data = await fetchAPI(url);
        let results = data?.data || (Array.isArray(data) ? data : []);
        if (results.length) {
            renderAnimeGrid(results);
            if (results.length >= 20) showLoadMore(() => { currentPage++; loadSearchMovie(keyword, currentPage); });
        } else {
            contentArea.innerHTML = `<div class="error-box">🎬 Movie tidak ditemukan: ${keyword}</div>`;
        }
    }
    
    function renderAnimeGrid(animeList) {
        if (!animeList.length) {
            contentArea.innerHTML = `<div class="error-box">📭 Tidak ada konten untuk ditampilkan</div>`;
            return;
        }
        
        const html = `
            <div class="anime-grid">
                ${animeList.map(anime => {
                    const slug = anime.slug || anime.id || anime.link_slug || anime.anime_slug || 
                                 (anime.title ? anime.title.toLowerCase().replace(/\s+/g, '-') : '');
                    const poster = anime.poster || anime.thumbnail || anime.image || anime.img || 
                                   'https://via.placeholder.com/200x280?text=No+Image';
                    const title = anime.title || anime.judul || anime.name || 'Tanpa judul';
                    const status = anime.status || (anime.episode ? `EP: ${anime.episode}` : '');
                    const genre = anime.genre ? (Array.isArray(anime.genre) ? anime.genre[0] : anime.genre.split(',')[0]) : '';
                    
                    return `
                        <div class="anime-card" data-slug="${slug}" data-title="${title}">
                            <img class="anime-img" src="${poster}" alt="${title}" loading="lazy" onerror="this.src='https://via.placeholder.com/200x280?text=Error'">
                            <div class="anime-info">
                                <div class="anime-title">${title.substring(0, 60)}</div>
                                <div class="anime-meta"><span>${status}</span><span>${genre}</span></div>
                            </div>
                        </div>
                    `;
                }).join('')}
            </div>
        `;
        contentArea.innerHTML = html;
        
        document.querySelectorAll('.anime-card').forEach(card => {
            card.addEventListener('click', async () => {
                const slug = card.dataset.slug;
                if (!slug) {
                    alert("Slug tidak ditemukan, coba pilih anime lain");
                    return;
                }
                await fetchAnimeDetail(slug);
            });
        });
    }
    
    async function fetchAnimeDetail(slug) {
        contentArea.innerHTML = `<div class="loading"><i class="fas fa-spinner fa-pulse"></i> Mencari detail anime dari 10+ sumber...</div>`;
        
        const detailData = await fetchDetailWithFallback(slug);
        
        if (detailData) {
            let episodes = [];
            if (detailData.episode_list && Array.isArray(detailData.episode_list)) episodes = detailData.episode_list;
            else if (detailData.episodes && Array.isArray(detailData.episodes)) episodes = detailData.episodes;
            else if (detailData.list_episode) episodes = detailData.list_episode;
            else if (detailData.episode) episodes = [{ slug: detailData.episode_slug || slug, title: "Episode 1" }];
            
            currentDetail = detailData;
            currentEpisodes = episodes;
            isDetailMode = true;
            await renderDetailPage(detailData, episodes);
        } else {
            contentArea.innerHTML = `
                <div class="error-box">
                    <i class="fas fa-exclamation-triangle" style="font-size: 48px; margin-bottom: 16px;"></i>
                    <h3>Gagal mengambil detail anime</h3>
                    <p>Slug: ${slug}</p>
                    <p>Coba periksa koneksi atau pilih anime lain</p>
                    <button class="retry-btn" onclick="location.reload()"><i class="fas fa-sync-alt"></i> Refresh Halaman</button>
                    <button class="retry-btn" style="background:#3a3a5a; margin-left:10px;" onclick="exitDetailMode()"><i class="fas fa-arrow-left"></i> Kembali</button>
                </div>
            `;
        }
    }
    
    async function renderDetailPage(detail, episodes) {
        const poster = detail.poster || detail.thumbnail || detail.image || detail.img || 'https://via.placeholder.com/200x280';
        const title = detail.title || detail.judul || detail.name || "Detail Anime";
        const synopsis = detail.synopsis || detail.sinopsis || detail.description || "Sinopsis tidak tersedia.";
        const genres = detail.genres ? (Array.isArray(detail.genres) ? detail.genres.join(', ') : detail.genres) : 'Tidak diketahui';
        const status = detail.status || (detail.ongoing ? "Ongoing" : (detail.completed ? "Completed" : "Unknown"));
        
        let episodeHtml = `<div class="episode-list"><h3><i class="fas fa-list"></i> Daftar Episode (${episodes.length || 0})</h3><div class="episode-grid">`;
        
        if (episodes && episodes.length) {
            episodes.forEach((ep, idx) => {
                let epSlug = ep.slug || ep.episode_slug || ep.link || (detail.slug ? `${detail.slug}-episode-${idx+1}` : '');
                let epNum = ep.episode || ep.title || `Episode ${idx+1}`;
                episodeHtml += `<div class="episode-btn" data-epslug="${epSlug}" data-epnum="${epNum}">📺 ${epNum}</div>`;
            });
        } else {
            episodeHtml += `<div style="grid-column:1/-1; text-align:center; padding:20px;">⚠️ Belum ada episode tersedia untuk anime ini</div>`;
        }
        episodeHtml += `</div></div><div id="playerWrapper" style="margin-top:20px;"></div>`;
        
        const html = `
            <div class="back-button" id="backFromDetail"><i class="fas fa-arrow-left"></i> Kembali ke daftar</div>
            <div class="detail-section">
                <div class="detail-header">
                    <div class="detail-poster"><img src="${poster}" alt="${title}" onerror="this.src='https://via.placeholder.com/200x280'"></div>
                    <div class="detail-info">
                        <div class="detail-title">${title}</div>
                        <div style="margin: 8px 0;"><strong>Status:</strong> ${status} | <strong>Genre:</strong> ${genres}</div>
                        <div class="detail-synopsis"><strong>Sinopsis:</strong><br>${synopsis.substring(0, 1000)}${synopsis.length > 1000 ? '...' : ''}</div>
                    </div>
                </div>
                ${episodeHtml}
            </div>
        `;
        contentArea.innerHTML = html;
        
        document.getElementById("backFromDetail")?.addEventListener("click", () => exitDetailMode());
        
        document.querySelectorAll('.episode-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                let epSlug = btn.dataset.epslug;
                if (!epSlug) {
                    alert("Link episode tidak tersedia");
                    return;
                }
                await loadEpisodeStream(epSlug);
            });
        });
        loadMoreContainer.style.display = "none";
    }
    
    async function loadEpisodeStream(episodeSlug) {
        const playerDiv = document.getElementById("playerWrapper");
        if (!playerDiv) return;
        
        playerDiv.innerHTML = `<div class="loading"><i class="fas fa-spinner fa-pulse"></i> Mencari link streaming dari 7+ sumber...</div>`;
        
        const episodeData = await fetchEpisodeWithFallback(episodeSlug);
        
        if (episodeData) {
            let streamUrl = episodeData.streaming_url || episodeData.url_stream || episodeData.embed_url;
            
            if (!streamUrl && episodeData.servers && episodeData.servers.length) {
                for (const server of episodeData.servers) {
                    if (server.url || server.embed) {
                        streamUrl = server.url || server.embed;
                        break;
                    }
                    if (server.id) {
                        const serverStream = await getStreamFromServer(server.id);
                        if (serverStream) {
                            streamUrl = serverStream;
                            break;
                        }
                    }
                }
            }
            
            if (streamUrl) {
                playerDiv.innerHTML = `
                    <div class="player-container">
                        <iframe src="${streamUrl}" allowfullscreen frameborder="0" allow="autoplay; encrypted-media"></iframe>
                        <div style="margin-top: 12px; text-align: center; font-size: 12px; color: #aaa;">
                            <i class="fas fa-play-circle"></i> Sumber: Multi Source | Jika tidak muncul, coba refresh
                        </div>
                    </div>
                `;
            } else {
                playerDiv.innerHTML = `<div class="error-box">🔗 Link streaming tidak ditemukan. Coba episode lain atau sumber berbeda.</div>`;
            }
        } else {
            playerDiv.innerHTML = `<div class="error-box">❌ Gagal mendapatkan link streaming. Episode mungkin belum tersedia.</div>`;
        }
    }
    
    function showLoadMore(callback) {
        loadMoreContainer.style.display = "block";
        const newBtn = document.getElementById("loadMoreBtn");
        if (newBtn) {
            newBtn.onclick = () => {
                callback();
                loadMoreContainer.style.display = "none";
            };
        }
    }
    
    navLinks.forEach(link => {
        link.addEventListener("click", (e) => {
            e.preventDefault();
            const navMode = link.dataset.nav;
            navLinks.forEach(l => l.classList.remove("active"));
            link.classList.add("active");
            setMode(navMode);
        });
    });
    
    tabBtns.forEach(btn => {
        btn.addEventListener("click", () => {
            tabBtns.forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            activeTab = btn.dataset.tab;
            currentPage = 1;
            isDetailMode = false;
            renderCurrentView();
        });
    });
    
    searchBtn.addEventListener("click", () => {
        const kw = searchInput.value.trim();
        if (kw === "") return;
        currentKeyword = kw;
        currentMode = "search";
        currentPage = 1;
        isDetailMode = false;
        renderCurrentView();
    });
    
    searchInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") searchBtn.click();
    });
    
    setMode("home");
</script>
</body>
</html>
